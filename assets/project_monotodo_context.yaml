      - "order 正規化は DELETE 対応版を採用。"
      - "tasks_after_change は DELETE 安全対応済み。"
  frontend:
    status: "UI先行（DoPage/useDoPageData のみ、Supabase repositories は未完成）"
  deployment:
    status: "Vercel 予定（環境変数の配置のみ最小で実施）"

