project_name: MonoToDo
project_codename: monotodo-app
language: ja
last_updated_jst: "2026-01-20"

# =====================================================
# 0. この仕様書の位置づけ（SoT）
# =====================================================
spec_policy:
  source_of_truth:
    - "supabase/schema.sql（本仕様書内の ddl_sql と同一内容を維持）"
    - "本仕様書（UX/ドメイン/DB/アーキの整合を保証するための一次資料）"
  change_management:
    - "DB仕様（DDL/RPC/Trigger/RLS）を変更する場合は schema.sql を必ず更新し、フロント（repo/hooks/pages）と同時に整合を取る"
    - "未確定を残したまま実装に進まない（ただし案出しは可）"

# =====================================================
# 1. アシスタントの役割 / ユーザープロファイル
# =====================================================
assistant_role:
  description: >
    あなた（ChatGPT）は、ユーザーの開発パートナー兼メンターとして、
    MonoToDo（モノトド）の仕様・設計・実装を一緒に詰めていく。
    仕様の整合性・DB一貫性・UX思想・クリーンアーキテクチャを最優先し、
    「未確定のまま実装に進まない」ことを絶対ルールとする。
  constraints:
    - 仕様・DB・UX・セキュリティ・アーキ整合を常に優先する
    - 未確定の状態を放置して先に進まない（ただし未確定を解消するための案出しはOK）
    - 確定仕様と矛盾しそうな点があれば必ず指摘し、矛盾解消 → 再確定の順で進める
    - 不要な機能提案や機能肥大を避け、MVPにフォーカスする

user_profile:
  interests:
    - 生産性・学習アプリ
    - Webフロントエンド（Vite+React+TS）
    - Supabase / Postgres / RLS / RPC
    - クリーンアーキテクチャ
  working_style:
    - 理詰め・仕様駆動
    - DBで「ガチガチ」に一貫性を担保する方針が好き
    - 設計と実装の対応関係をはっきりさせたい
  expectations_for_assistant:
    - 単なるコード提供ではなく、設計〜実装まで一貫して伴走してほしい
    - 矛盾や危うい点があれば、きちんと突っ込んでほしい
    - 不足や盲点を積極的に指摘してほしい

# =====================================================
# 2. プロダクト背景 / 目的 / 哲学
# =====================================================
background:
  motivation: |
    書籍『奪われた集中力（Stolen Focus）』の考え方と
    「ブロック計画法 × ToDoリスト × ポモドーロタイマー」を統合した、
    注意の分断を減らす学習・生産性Webアプリを作る。

    ゴチャゴチャしたタスク管理ツールではなく、
    「今やる一つだけ」に視点を強制的に絞り、
    ポモドーロブロックで着手と前進を自動化することが狙い。
  goal_statement: |
    “今やる一つだけ”に視野を絞り、ポモドーロの集中ブロックで着手と前進を自動化する。
    注意の分断をUIの制約で減らし、開始ハードルを下げ、進捗実感
    （完了タスク数・streak・サブゴール完遂率）を提供する簡単なWebアプリを作る。
  core_philosophy:
    - 視点は常に「次の一つ」に固定する
    - UI制約で注意分断・選択負荷を減らす
    - Focus中は操作を極限まで制限し、ナビゲーションも隠す
    - データ整合性・制約はできる限りDBレイヤーでガチガチに担保する
    - 長期履歴や多目的管理よりも、「一つの大きな目的に集中」することを優先
    - 必要になったらGoalリセットで全削除してやり直せる設計とする
    - MVPはフルオンライン（オフラインキュー無し）を前提とし、複数端末利用は
      「必要ならブラウザをリロードして最新状態に追従する」運用とする

non_goals:
  - 複数のGoalを同時に扱う高機能タスクマネージャーになること
  - 初期MVPの段階でのPWAオフラインキュー実装
  - リアルタイムコラボレーションや他ユーザーとの共有機能

# =====================================================
# 3. 画面構成 / UXフロー
# =====================================================
pages:
  list: [login, setting, plan, do, focus]

ux_flow:
  summary: |
    - 入口は常に Do。
    - Do が「次のタスク無し」を検知したら Plan へ誘導（空状態）。
    - Plan で Goal → Subgoal → Task を作成・編集。
    - Do は「次のタスク」1件だけを表示し、「開始」で Focus へ遷移。
    - Focus でポモドーロを実行。中断/完了は必ず確認ダイアログ。
    - Focus中はナビ非表示・他ページ遷移不可・タスク切替不可。
  multi_device_policy: |
    - 1ユーザー=複数端末は想定する。
    - Realtime同期は行わず、最新状態に追従したい場合は「ブラウザリロード」運用。
  online_only_policy: |
    - オフライン保存/キュー/後追い同期はMVPでは実装しない。
    - オフライン時はエラーを返し、ユーザーがオンライン復帰後に再試行する。

do_page_logic:
  next_task_selection:
    description: "Doページに表示する「次のタスク」を 1件だけ決めるロジック。"
    selection_criteria:
      - "対象は未完了タスクのみ（通常＋ループ）"
      - "優先順位: subgoals.order 昇順 → subgoals.created_at 昇順 → tasks.order 昇順 → tasks.created_at 昇順"
      - "サブゴール完遂率は『通常タスクのみ』を対象に整数%で算出"
  empty_states:
    order: [E1, E2, E3]
    E1:
      condition: "サブゴール0件"
      heading: "目的に向けて、最初のブロックを作ろう"
      body: |
        このアプリでは“目的（Goal）”に到達するために、サブゴール（ブロック）とタスクに分けて進めます。
        Planでサブゴールとタスクを設定すると、Doに“次のタスク”が表示されます。
      cta: { label: "Planでブロックを作る", to: "/plan" }
    E2:
      condition: "サブゴールはあるが通常タスク0件"
      heading: "目的に合わせて、タスクまで落とし込もう"
      body: |
        サブゴール（ブロック）を、達成のための通常タスクに分けて設定しましょう。
        通常タスクを設定すると、ここに“次のタスク”が表示されます。
      cta: { label: "Planでタスクを追加", to: "/plan" }
    E3:
      condition: "未完了候補0件（全タスク完了）"
      heading: "タスクはすべて完了しています"
      body: "新しいタスクを追加する場合はPlanへ進んでください。"
      cta: { label: "Planでタスクを追加", to: "/plan" }

focus_page_logic:
  restrictions:
    - "Focus中はナビゲーションバー非表示"
    - "他ページへの遷移不可（Back操作も制御）"
    - "タスクの切替不可"
  timer_ui:
    - "中央の大きな mm:ss 表示"
    - "円形プログレスバー（react-circular-progressbar）"
  controls:
    pause_resume:
      behavior: "単一トグル。pause/resume の切替。DB/メトリクスに影響しない。"
    interrupt:
      dialog_text: "タスクは完了になりません。セッションを中断しますか？"
      on_confirm: "DB更新なしで /do に戻る"
    complete:
      dialog_text: "タスクが完了になります。セッションを終了しますか？"
      on_confirm: "RPC monotodo_complete_task を呼び、成功後 /do に戻る"

plan_page_behavior:
  goal_input:
    description: "Goal タイトル 1行入力。空でもOK（プレースホルダで促す）。"
  subgoal_list:
    rules:
      - "DnDで並び替え（order はDB側で連番に正規化）"
      - "削除ボタンあり（強調しすぎない）"
      - "Subgoal 上限 30。超過時は追加不可（ボタン非活性、Enter追加も無反応）"
  task_list:
    rules:
      - "1 Subgoal 内に複数 Task 行"
      - "IME確定済み Enter で『入力確定＋新規行追加』"
      - "IME確定中の Enter は追加扱いしない"
      - "DnDで並び替え（order はDB側で連番に正規化）"
      - "削除アイコンあり"
      - "is_loop トグルで通常/ループ切替（表示は控えめ）"
      - "Subgoal毎に Task 上限 30（完了済みも含む）。超過時は追加不可"
  keyboard_ux_open_point:
    status: "仕様案（最終確定前）"
    detail: "サブゴールタイトルで Enter → その Subgoal の Task 行追加、を希望。実装フェーズで最終確定。"
  ai_panel:
    status: "MVPでは feature flag でOFF（後で確定してON）"

setting_page_behavior:
  data: "user_settings"
  status: "未確定点あり"
  open_points:
    - "保存タイミング（即時反映 vs 保存ボタン）"
    - "入力UI（数値入力/スライダー等）"
    - "バリデーション（最小/最大、整数）をフロント/DBどちらでどう担保するか"

# =====================================================
# 4. ドメインモデル / メトリクス / ログ
# =====================================================
domain_model:
  goal:
    description: "ユーザーにつき常に1つだけ存在する『目的』。"
    constraints:
      - "1ユーザー1Goal（goals.user_id UNIQUE）"
      - "Goal.title は空文字OK"
      - "Goalがない状態でSubgoal挿入が来たら、DB側で空Goalを自動生成して採用（RPC）"
  subgoal:
    alias: "block"
    constraints:
      - "Goalあたり最大30件"
      - "title 255文字まで（DBトリガーで拒否）"
      - "order は正の整数、Goal内で連番に正規化（トリガー）"
      - "completed は『通常タスクのみが全て完了』で true"
      - "通常タスク0件なら completed=false、進捗0%"
  task:
    types:
      normal:
        is_loop: false
        role: "Subgoal完遂率・Subgoal.completed 判定対象。"
      loop:
        is_loop: true
        role: |
          サブゴールに紐づく習慣タスク。
          Subgoal完遂率/完了判定には含めないが、日次ログとGoalメトリクス（累積）に反映し、
          streak条件（その日1つでも完了があればOK）の一部として影響する。
    constraints:
      - "Subgoalあたり最大30件（完了済みも含む）"
      - "title 255文字まで"
      - "order は正の整数、Subgoal内で連番に正規化（トリガー）"
      - "completed / completed_at を保持"
  metrics:
    goals_columns:
      completed_normal_task_count:
        meaning: "通常タスク完了の累積回数。完了→解除で増減し、タスク削除では変更しない。"
      total_completed_loop_task_count:
        meaning: "ループタスク完了の累積回数。日次集計で加算される。"
      current_streak:
        meaning: "連続活動日数（前日まで集計済み）。"
      last_aggregated_date:
        meaning: "streak/ループ集計済みの最終日。"
  logs:
    table: "task_completion_logs"
    grain: "(user_id, goal_id, activity_date) で1行"
    semantics:
      - "had_any_completion: その日、そのGoalで通常/ループ問わず1つでも完了状態があれば true"
      - "completed_loop_count: その日に完了したループタスク回数"
      - "completion_counter: その日の完了状態タスク数（通常＋ループ）の内部カウンタ"

# =====================================================
# 5. 時刻・タイムゾーン設計（重要）
# =====================================================
time_and_timezone:
  conclusion: "JST化は『活動日（date）と集計ロジック』に適用済み。タイムスタンプはUTC保存を維持。"
  rationale: |
    - timestamptz（created_at/updated_at/completed_at）は「絶対時刻」であり、UTC保存が運用・移行・比較で安全。
    - 一方で、streak や「その日の完了」を判定する activity_date はユーザーの生活日付（JST）に合わせる必要がある。
    - よって「date は JST」「timestamptz は UTC」を採用する。
  implemented:
    - "monotodo_current_jst_date() を追加し、RPC内で v_today をJST dateとして計算"
    - "monotodo_complete_task / monotodo_aggregate_missing_days は JST date で処理"
  not_converted_and_reason:
    - item: "created_at / updated_at / completed_at の default / 更新"
      reason: "UTC保存（timestamptz）を維持するため。アプリ表示時にJSTへ変換すればよい。"

# =====================================================
# 6. 認証・セキュリティ
# =====================================================
auth_and_security:
  auth:
    provider: "Supabase Auth"
    model: "auth.users"
    usage:
      - "フロントは Supabase Auth でログインし、JWTにより auth.uid() がDB側で参照できる"
      - "未ログインは /login にリダイレクト（RequireAuth）"
  rls_policy:
    summary: "全業務テーブルは RLS 有効。auth.uid() と user_id の一致でアクセス制御。"
  rpc_security_definer:
    summary: |
      - 主要RPCは security definer。
      - RPC内で auth.uid() が null の場合は拒否、対象データが自ユーザーか検証する。
  error_codes:
    mapping_keys:
      - MONOTODO_GOAL_EXISTS
      - MONOTODO_FORBIDDEN
      - MONOTODO_UNAUTHORIZED
      - MONOTODO_SUBGOAL_LIMIT_EXCEEDED
      - MONOTODO_TASK_LIMIT_EXCEEDED
      - MONOTODO_TITLE_TOO_LONG
      - MONOTODO_INVALID_ORDER
      - MONOTODO_SAVE_FAILED_RETRY

security_notes:
  react_rsc_cve_2025_55182:
    conclusion: |
      MonoToDo は Vite + react-router-dom の SPA として提供し、React Server Components（RSC）を処理するサーバーが基本的に存在しない。
      そのため「不正なFlightペイロードをRSC処理サーバーへ送ることで成立する」タイプの影響は、現アーキテクチャでは原則受けない前提。
    scope_guard:
      - "将来 Next.js 等で RSC を処理する構成に変更した場合は再評価が必須"
      - "依存に react-server-dom-* を導入する場合は同様に再評価が必須"

# =====================================================
# 7. 技術スタック / デプロイ
# =====================================================
tech_stack:
  frontend:
    - Vite
    - React
    - TypeScript
    - react-router-dom
    - TailwindCSS
    - shadcn/ui (Radix UI)
    - react-circular-progressbar
    - @supabase/supabase-js
  backend:
    - Supabase (Auth / Postgres / RLS / RPC / Trigger)
  deployment:
    platform: "Vercel"
    policy_minimum:
      - "VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY はVercel環境変数で管理（リポジトリに入れない）"
      - "Preview/Production で環境変数（少なくともキー）を分離する方針を推奨（MVPは最小運用でも可）"
  offline_policy:
    - "オフライン案は棄却。フルオンライン前提。"

# =====================================================
# 8. アーキテクチャ / フォルダ構成
# =====================================================
architecture:
  layers:
    presentation:
      responsibility: "画面と見た目（ユーザーに見える部分）。"
      modules:
        - "src/pages/**"
        - "src/components/**"
        - "src/routes/router.tsx"
        - "src/styles/**"
        - "src/App.tsx"
        - "src/main.tsx"
    application:
      responsibility: "画面固有ロジック・ユースケース（hook/service）。"
      modules:
        - "src/features/do/hooks/useDoPageData.ts"
        - "src/features/plan/hooks/usePlanData.ts"
        - "src/features/focus/hooks/useFocusTimer.ts"
        - "src/service/**（予定地）"
        - "src/hooks/**（共通hooks予定地）"
    infrastructure:
      responsibility: "外部I/O（Supabase）とデータアクセス（repositories）。"
      modules:
        - "src/lib/supabaseClient.ts"
        - "src/repositories/*.ts"
        - "src/types/domain.ts"
        - "supabase/schema.sql"
        - "supabase/seed.sql"

filesystem_layout:
  root: |
    monotodo-app/
    ├─ node_modules/      # 依存ライブラリ
    ├─ public/            # 静的ファイル
    ├─ src/               # フロントエンドの本体コード
    └─ supabase/          # DB（Postgres / Supabase）関連のSQL
  src: |
    src/
    ├─ App.tsx
    ├─ env.d.ts
    ├─ main.tsx
    ├─ assets/
    │  └─ react.svg
    ├─ components/
    │  ├─ layouts/
    │  │  ├─ AppLayout.tsx
    │  │  └─ FocusLayout.tsx
    │  └─ ui/
    │     ├─ button.tsx
    │     ├─ dialog.tsx
    │     └─ input.tsx
    ├─ features/
    │  ├─ do/hooks/useDoPageData.ts
    │  ├─ focus/hooks/useFocusTimer.ts
    │  └─ plan/hooks/usePlanData.ts
    ├─ hooks/                  # 共通hooks（今は空）
    ├─ lib/
    │  ├─ supabaseClient.ts
    │  └─ utils.ts
    ├─ pages/
    │  ├─ auth/LoginPage.tsx
    │  ├─ auth/RequireAuth.tsx
    │  ├─ do/DoPage.tsx
    │  ├─ focus/FocusPage.tsx
    │  ├─ plan/PlanAiPanel.tsx
    │  ├─ plan/PlanPage.tsx
    │  ├─ plan/PlanSidebar.tsx
    │  └─ setting/SettingPage.tsx
    ├─ repositories/
    │  ├─ doRepository.ts
    │  ├─ goalRepository.ts
    │  └─ taskRepository.ts
    ├─ routes/router.tsx
    ├─ service/                # 予定地（今は空）
    ├─ styles/global.css
    └─ types/domain.ts
  supabase: |
    supabase/
    ├─ schema.sql   # テーブル・関数・トリガなど（本仕様書の ddl_sql と一致させる）
    └─ seed.sql     # 開発用の初期データ（任意）

# =====================================================
# 9. フロントエンド仕様（データ取得責務）
# =====================================================
frontend_spec:
  routing:
    entry_route: "/do"
    routes:
      - { path: "/login", component: "LoginPage", layout: null, guard: null }
      - { path: "/plan", component: "PlanPage", layout: "AppLayout", guard: "RequireAuth" }
      - { path: "/do", component: "DoPage", layout: "AppLayout", guard: "RequireAuth" }
      - { path: "/focus", component: "FocusPage", layout: "FocusLayout", guard: "RequireAuth" }
      - { path: "/setting", component: "SettingPage", layout: "AppLayout", guard: "RequireAuth" }
  data_access_pattern:
    - "pages は hooks から state / actions を受け取り描画に集中する"
    - "hooks は repositories を注入され、データ取得・状態管理・リトライを担う"
    - "repositories は Supabase（RPC/Select/Update）を呼び、必要なら戻り値整形とエラー分類を担う"
  current_dev_note:
    - "現状、DoPage は inMemoryRepo を内部定義し useDoPageData(inMemoryRepo) を呼ぶ暫定実装が存在"
    - "最終的には SupabaseRepo 実装に差し替え（repo注入のみで差し替え可能にする）"

