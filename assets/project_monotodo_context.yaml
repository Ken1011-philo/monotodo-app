# =====================================================
# MonoToDo 全体仕様書（Consolidated SoT）
# 目的: これまで確定した仕様を「確定/未確定」を明示して一元化する
# 注意: 未確定の項目は status: undecided として残し、推測で確定しない
# =====================================================

meta:
  project_name: MonoToDo
  codename: monotodo-app
  language: ja
  timezone:
    user: "Asia/Tokyo"
    db_storage: "UTC (timestamptz)"
    activity_date_basis: "Asia/Tokyo (date)"
  status:
    overall: "active_development"
    offline_support: "rejected (full online)"
  stakeholders:
    product_owner: "you"
    repo_owner: "you"
    deployment_owner: "you"

product:
  vision:
    summary: "集中型タスク管理（Block Planning × ToDo × Pomodoro）で、意思決定コストと注意分断を最小化する"
    principles:
      - "Planで意思決定、Doでは最優先1件を提示して迷いを減らす"
      - "Focus中は注意分断を避ける（ナビ非表示など）"
      - "整合性は可能な限りDB側で担保（制約・トリガ・RPC）"
  target_users:
    status: "decided"
    notes:
      - "集中しすぎる人／全然集中できない人の両方を支援（例: 休憩を促す）"
  key_outcomes:
    status: "decided"
    metrics:
      - "通常タスク完了累積"
      - "ループタスク完了累積"
      - "JST基準の連続活動日数（streak）"

assumptions_and_constraints:
  client_model:
    status: "decided"
    notes:
      - "SPA（Vite + react-router-dom）"
      - "サーバーでRSCを処理する構成は基本的に存在しない前提（影響評価の結論を仕様に反映予定）"
  multi_device:
    status: "decided"
    notes:
      - "1ユーザー=複数端末を想定"
      - "最新状態に追従したい場合はブラウザリロードを促す旨を仕様に含める（自動追従は必須要件にしない）"
  offline_support:
    status: "decided"
    decision: "棄却（フルオンライン想定）"

tech_stack:
  frontend:
    status: "decided (current)"
    runtime: "React SPA"
    bundler: "Vite"
    language: "TypeScript"
    router: "react-router-dom"
    ui:
      - "TailwindCSS"
      - "shadcn/ui (Radix UI 기반)"
      - "lucide-react"
    supabase_client: "@supabase/supabase-js"
    package_versions_snapshot:
      status: "decided (as provided)"
      react: "19.2.0"
      react_dom: "19.2.0"
      react_router_dom: "7.9.6"
      vite: "7.2.4"
      typescript: "5.9.3"
      supabase_js: "2.84.0"
  backend:
    status: "decided"
    primary: "Supabase (PostgreSQL + Auth + RLS + RPC)"
    server_app: "none (frontend only)  # 現時点"
  deployment:
    status: "decided (direction)"
    platform: "Vercel"
    notes:
      - "フロントのみデプロイ"
      - "Supabase URL/ANON KEY は環境変数で注入（公開キーである点を前提に最小権限/RLSで守る）"
    details:
      status: "undecided"
      items:
        - "Preview/Production の環境分離手順"
        - "ビルド設定（install/build/output）明文化"
        - "依存固定・更新方針（caret運用の扱い）"

repo_structure:
  status: "decided (current documented structure)"
  root:
    - "node_modules/"
    - "public/"
    - "src/"
    - "supabase/"
  src:
    files:
      - "App.tsx"
      - "env.d.ts"
      - "main.tsx"
    folders:
      assets: ["react.svg"]
      components:
        layouts: ["AppLayout.tsx", "FocusLayout.tsx"]
        ui: ["button.tsx", "dialog.tsx", "input.tsx"]
      features:
        do:
          hooks: ["useDoPageData.ts"]
        focus:
          hooks: ["useFocusTimer.ts"]
        plan:
          hooks: ["usePlanData.ts"]
      hooks: []
      lib: ["supabaseClient.ts", "utils.ts"]
      pages:
        auth: ["LoginPage.tsx", "RequireAuth.tsx"]
        do: ["DoPage.tsx"]
        focus: ["FocusPage.tsx"]
        plan: ["PlanAiPanel.tsx", "PlanPage.tsx", "PlanSidebar.tsx"]
        setting: ["SettingPage.tsx"]
      repositories: ["doRepository.ts", "goalRepository.ts", "taskRepository.ts"]
      routes: ["router.tsx"]
      service: []
      styles: ["global.css"]
      types: ["domain.ts"]
  supabase:
    files:
      - "schema.sql  # テーブル・関数・トリガなど"
      - "seed.sql    # 開発用初期データ"
  architecture_mapping:
    presentation_layer:
      - "pages/**"
      - "components/**"
      - "routes/router.tsx"
      - "styles/**"
    application_layer:
      - "features/**/hooks/**  # 画面固有のロジック"
      - "service/**            # ユースケース集約（予定地）"
      - "hooks/**              # 共通hooks（予定地）"
    infrastructure_layer:
      - "lib/supabaseClient.ts"
      - "repositories/*.ts"
      - "types/domain.ts"
      - "supabase/schema.sql"

authentication_and_authorization:
  status: "decided (high level)"
  auth_provider: "Supabase Auth"
  primitives:
    auth_users_table: "auth.users"
    auth_uid_function: "auth.uid()"
  meaning_of_auth_uid:
    status: "decided"
    explanation:
      - "RLSポリシーやSQL/RPC内で、現在の認証ユーザーIDを参照できる"
      - "クライアントがSupabase Authでログインし、JWTが付与されているリクエスト文脈で有効"
  access_control:
    status: "decided (direction)"
    rls: "enabled on user-owned tables"
    preferred_write_path:
      status: "decided (recommendation)"
      rule: "クライアント直DMLを最小化し、整合性が必要な操作はRPC経由"
    notes:
      - "RLSの具体Grant/権限設計は実装レベルで未確定要素が残る"

ui_pages_and_flows:
  status: "partially decided"
  pages:
    auth:
      - name: "LoginPage"
        purpose: "ログイン"
        status: "decided (exists)"
      - name: "RequireAuth"
        purpose: "認証ガード"
        status: "decided (exists)"
    plan:
      - name: "PlanPage"
        purpose: "Goal/Subgoal/Task の計画（追加・並び・編集）"
        status: "decided (exists)"
      - name: "PlanSidebar"
        purpose: "補助UI（ナビ/サブ情報）"
        status: "decided (exists)"
      - name: "PlanAiPanel"
        purpose: "AI提案表示・採用"
        status: "decided (exists)"
      behaviors:
        add_task_on_enter:
          status: "decided"
          rule: "タスク入力の確定後 Enter で次のタスク入力を追加"
        add_task_from_subgoal_enter:
          status: "decided"
          rule: "サブゴール入力の確定後 Enter で、そのサブゴール内に新規タスク入力を追加"
        ui_readability:
          status: "decided (problem recognized)"
          issue: "subgoal/taskのネスト + 白基調で視認性低下"
          action: "色分け設計を検討（詳細案は別）"
    do:
      - name: "DoPage"
        purpose: "次にやるタスクを1件提示し、完了と日次集計を促進"
        status: "decided (exists, partial implementation)"
      core_rule:
        status: "decided"
        summary: "Doでは最優先タスクを単一表示（DB側選定/RPC想定）"
    focus:
      - name: "FocusPage"
        purpose: "Pomodoroタイマーで集中と休憩を支援"
        status: "decided (exists)"
      layout_rule:
        status: "decided (direction)"
        rule: "Focus中はナビ無しレイアウト（FocusLayout）"
    setting:
      - name: "SettingPage"
        purpose: "Pomodoro設定など"
        status: "decided (exists)"
  navigation:
    status: "undecided (details)"
    notes:
      - "ルーティングは routes/router.tsx で定義"
      - "Focus時のナビ抑制は方針として確定、実装詳細は別タスク"

data_model_and_db:
  status: "decided (target design is Sync-first v0.3)"
  legacy:
    status: "decided (exists historically)"
    notes:
      - "旧DDLはJST基準日付/集計の修正を進めた"
      - "order正規化トリガ（normalize_order）などの仕組みが存在した"
  target_design:
    name: "Sync-first v0.3"
    goals:
      - "複数端末で破綻しない（競合検知・差分同期・冪等）"
      - "並び替えはgap方式 sort_key（原則1行UPDATE）"
      - "削除はtombstone（deleted_at）"
      - "done一覧は completed_at desc 固定（手動順なし）"
      - "整合性はDBで担保（RPC必須化前提）"
    time_policy:
      storage: "timestamptz UTC"
      jst_activity_date:
        type: "date"
        function: "monotodo_current_jst_date()"
    hierarchy_constraints:
      single_goal_per_user: true
      subgoals_per_goal:
        max: 30
        scope: "deleted_at is null"
      plan_items_per_subgoal:
        max: 30
        definition: "tasks(kind=normal, deleted_at is null) + loop_task_templates(is_active=true, deleted_at is null)"
    ordering:
      scheme: "gap sort_key (bigint)"
      priority: "smaller sort_key = higher priority"
      reindex: "詰まり時のみ reindex RPC で再採番"
    loop_tasks_model:
      status: "decided"
      separation:
        loop_task_templates: "繰り返しの設計図（plan items）"
        tasks_loop_instance: "特定日(JST activity_date)の実体"
      rules:
        - "loop_instance は (loop_template_id, activity_date) で最大1件（UNIQUE）"
        - "未完了持ち越し：直近実体が未完了なら新規生成しない"
        - "subgoal.completed=true の場合は生成しない（テンプレも停止される）"
      conversion_loop_to_normal:
        status: "decided"
        rule:
          - "テンプレを停止/削除（is_active=false & deleted_at）"
          - "最新未完了のloop_instanceがあれば normal に変換"
    deletion_policy:
      status: "decided"
      method: "deleted_at tombstone"
      physical_delete:
        status: "decided (limited)"
        rule: "reset_goal のみ物理削除（cascade）を許容"
    concurrency_and_sync:
      status: "decided (design)"
      global_cursor:
        name: "sync_seq"
        source: "public.monotodo_sync_seq (sequence)"
        usage: "差分同期のカーソル"
      per_row_revision:
        name: "revision (bigint)"
        method: "楽観ロック expected_revision をRPC引数に必須"
      reset_propagation:
        user_state_goal_generation:
          status: "decided"
          purpose: "goal resetを他端末へ通知しローカル全消去を促す"
          rule: "reset_goal 時に goal_generation++"
    write_path:
      status: "decided (recommendation)"
      rule: "クライアント直UPDATE/DELETEを禁止し、RPCのみ許可（整合性のため）"

  tables:
    status: "decided (design)"
    common_columns:
      user_id: "uuid (auth.users.id)"
      created_at: "timestamptz UTC"
      updated_at: "timestamptz UTC"
      revision: "bigint"
      sync_seq: "bigint"
      deleted_at: "timestamptz (where applicable)"
    list:
      user_state:
        pk: "user_id"
        fields:
          - "goal_generation bigint default 1"
        purpose: "同期基盤 & reset伝播"
      goals:
        unique: ["user_id unique"]
        purpose: "1ユーザー1Goal + 集計メトリクス"
      user_settings:
        pk: "user_id"
        purpose: "Pomodoro設定（reset対象外）"
      subgoals:
        fields:
          - "sort_key bigint"
          - "completion_mode enum('auto','manual')"
          - "manual_completed boolean"
          - "completed boolean"
          - "deleted_at timestamptz"
        purpose: "計画単位（並び順 + 手動完了）"
      loop_task_templates:
        fields:
          - "sort_key bigint"
          - "is_active boolean"
          - "deleted_at timestamptz"
        purpose: "繰り返しタスクの設計図（plan items）"
      tasks:
        fields:
          - "kind enum('normal','loop_instance')"
          - "completed boolean"
          - "completed_at timestamptz"
          - "sort_key bigint"
          - "loop_template_id uuid nullable"
          - "activity_date date nullable (JST, loop_instanceのみ必須)"
          - "deleted_at timestamptz"
        purpose: "通常タスク + ループ実体"
      task_completion_logs:
        unique: ["(user_id, goal_id, activity_date)"]
        fields:
          - "activity_date date (JST)"
          - "had_any_completion boolean"
          - "completed_loop_count int"
          - "completion_counter int"
        purpose: "日次ログ（streak/loop累積/日次カウンタ）"
      ai_suggestion_sessions:
        purpose: "AI提案セッションログ"
      ai_suggestion_items:
        purpose: "AI提案アイテム（採用先FK optional）"

  rpc_and_db_logic:
    status: "decided (design list; implementation pending)"
    core_functions:
      monotodo_current_jst_date: "(now() at time zone 'Asia/Tokyo')::date"
      monotodo_check_title_length: "title <= 255"
      monotodo_touch_row:
        on_insert: "created_at/updated_at + revision=0 + sync_seq=next"
        on_update: "updated_at + revision++ + sync_seq=next"
    rpcs:
      sync:
        monotodo_sync:
          signature: "monotodo_sync(after_seq bigint default 0) -> stream"
          guarantees:
            - "sync_seq昇順"
            - "tombstone（deleted_at）も返却"
      plan_do:
        monotodo_select_next_task:
          rule: "subgoal.sort_key asc -> task.sort_key asc -> created_at -> id"
          scope: "deleted_at is null AND completed=false"
      completion:
        monotodo_complete_task:
          signature: "monotodo_complete_task(task_id uuid, completed boolean, expected_revision bigint)"
          notes:
            - "normal: goals.completed_normal_task_count を増減"
            - "loop_instance: 日次ログを更新（減算可否は未確定が残る）"
      aggregation:
        monotodo_aggregate_missing_days:
          purpose: "last_aggregated_date+1 から 昨日まで集計し streak/loop累積更新"
      loop_generation:
        monotodo_rollover_loop_tasks:
          purpose: "今日分loop_instanceを必要に応じ生成（冪等）"
      ordering_ops:
        monotodo_move_subgoal: "sort_keyをgap計算で更新"
        monotodo_move_task: "active内のみ手動並べ替え対象"
      delete_ops:
        monotodo_delete_task: "deleted_at を立てる"
        monotodo_delete_subgoal: "deleted_at を立てる"
      subgoal_manual:
        monotodo_set_subgoal_manual_completed:
          note: "未完了へ戻す時に配下タスクを戻さない（安全側）"
      loop_conversion:
        monotodo_convert_loop_to_normal: "テンプレ停止 + 未完了実体をnormal化"
      reset:
        monotodo_reset_goal:
          behavior:
            - "user_state.goal_generation++"
            - "goals 物理削除（cascade）"
            - "user_settings は保持"
    rls:
      status: "decided (design)"
      enabled_tables:
        - "goals"
        - "user_state"
        - "user_settings"
        - "subgoals"
        - "loop_task_templates"
        - "tasks"
        - "task_completion_logs"
        - "ai_suggestion_sessions"
        - "ai_suggestion_items"
      base_rule: "auth.uid() = user_id"
      ai_items_rule: "session所有者がauth.uid()の時のみ操作可"

repositories_and_hooks:
  status: "decided (structure); some implementations pending"
  relationship:
    summary: "pages -> feature hooks -> repositories -> supabaseClient"
    details:
      - "hooksは画面ロジック（状態・ロード・更新）を保持"
      - "repositoriesはDBアクセス（RPC呼び出し、クエリ）をカプセル化"
      - "supabaseClient.ts は接続基盤（URL/ANON KEY）"
  current_state:
    decided:
      - "DoPage が useDoPageData(inMemoryRepo) を使用した仮実装が存在"
    evaluation:
      status: "decided (short-term acceptable)"
      notes:
        - "見た目作りには有効だが、永続化/整合性/RPC連携に移行する前提"
        - "発展性の鍵は『Repo interfaceを固定し、実装差し替え可能』にすること"
  repo_modules:
    doRepository:
      purpose: "Doページ用（next task, today stats, aggregate など）"
      status: "partially implemented / pending"
    goalRepository:
      purpose: "Goalの取得/初期化/リセットなど"
      status: "pending"
    taskRepository:
      purpose: "Task CRUD/並び替え/完了など"
      status: "pending"

security_and_compliance:
  status: "partially decided"
  policies:
    rls: "必須"
    write_path: "RPC優先（直DML禁止が推奨）"
    secrets:
      status: "decided (direction)"
      note: "Supabase ANON KEYはクライアント公開前提。RLSで防御。"
  vulnerabilities:
    react_rsc_cve_2025_55182:
      status: "decided (high-level conclusion exists)"
      conclusion_to_document:
        - "MonoToDoはVite SPAでRSC処理サーバーが基本的に存在しない前提整理を仕様化"
      details:
        status: "undecided (doc text not yet written)"

operations_and_dev_workflow:
  status: "partially decided"
  local_dev:
    commands:
      - "npm install"
      - "npm run dev"
      - "npm run build"
      - "npm run preview"
    notes:
      - "Vite依存最適化でWindowsのEBUSYが出る場合がある（ロック/ウイルス対策/再起動等で回避が必要）"
  db_workflow:
    status: "decided (Supabase SQL Editor)"
    notes:
      - "schema.sql をSQL Editorで適用"
      - "既に適用済みDDLの修正は migration（alter/create or replace）で追従"
      - "全削除/新規プロジェクトでやり直しより、原則は差分migration（ただし初期段階は全削除方針も選択肢）"
  testing:
    status: "undecided"
    scope_candidates:
      - "DB: RPCの単体テスト（SQLで再現）"
      - "Frontend: E2E/Playwright"
      - "Contract: repository interfaceの検証"

team:
  status: "decided (current split)"
  roles:
    product_spec_owner:
      person: "you"
      responsibility:
        - "仕様決定とレビュー（特にUI/UX）"
    tech_lead_architect:
      person: "member H"
      responsibility:
        - "全体アーキ/品質"
    frontend_uiux:
      person: "member S"
      responsibility:
        - "レイアウト/コンポーネント"
    frontend_hooks:
      person: "member O"
      responsibility:
        - "Do/Plan/Focus の useXXX 実装"
    supabase_and_repositories:
      person: "member M"
      responsibility:
        - "DB/RPC/RLS + repositories 実装（あなたレビュー）"
    qa_devops_support:
      person: "member T"
      responsibility:
        - "QA/CI/CD/不足部分サポート"
  repo_management:
    status: "decided"
    notes:
      - "リポジトリ管理とデプロイはあなたが担当"

open_decisions:
  status: "explicitly tracked"
  loop_uncomplete_behavior:
    question: "loop_instance を完了→未完了に戻す操作を許可するか？許可するなら日次ログの減算をどう扱うか？"
    status: "undecided"
    default_safe: "戻す操作を許可しても、日次ログは減算せず（監査的カウント）にする、等の固定が必要"
  manual_subgoal_uncomplete_reopen_tasks:
    question: "サブゴール手動未完了時に、配下タスクを自動で未完了に戻すか？"
    status: "undecided"
    default_safe: "戻さない（別RPCで明示）"
  rls_grants_model:
    question: "authenticated への table権限（SELECTのみ）と RPC EXECUTE の付与をどう確定するか"
    status: "undecided"
  vercel_env_separation:
    question: "Preview/ProdでSupabaseプロジェクトを分けるか、同一で分離するか"
    status: "undecided"
  dependency_update_policy:
    question: "caret運用を継続するか、固定/自動更新（Renovate/Dependabot）を採用するか"
    status: "undecided"

